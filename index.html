<style>
:root{
  --paper:#F2F2EF; --ink:#1A1A17; --muted:#8E8E88; --line:#E4E4DE;
  --surface:#FFFFFF; --accent:#2B44E0; --accent-soft:#ECEEFC;
  --sans:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
body{max-width:460px;margin:0 auto;padding:26px 18px calc(30px + env(safe-area-inset-bottom))}
.top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.brand{font:600 10px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--ink)}
.status{font:400 13px/1.3 var(--sans);color:var(--muted);margin-top:7px}
.chip{background:transparent;border:1px solid var(--line);border-radius:100px;padding:9px 15px;font:500 13px var(--sans);color:var(--ink);cursor:pointer;transition:.12s;white-space:nowrap}
.chip:active{transform:scale(.96)}
.chip.warn{border-color:var(--accent);color:var(--accent)}
.taps{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tap{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:28px 14px 20px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:transform .08s,border-color .15s}
.tap:active{transform:scale(.975)}
.tap.accent{border-color:#D9DEFA}
.num{font:700 62px/1 var(--sans);letter-spacing:-3px;font-variant-numeric:tabular-nums;color:var(--ink)}
.tap.accent .num{color:var(--accent)}
.num.bumped{animation:bump .22s ease}
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.14)}100%{transform:scale(1)}}
.tlab{font:500 12px var(--sans);color:var(--muted);margin-top:2px}
.plus{margin-top:16px;font:600 13px var(--sans);color:#fff;background:var(--ink);border-radius:100px;padding:8px 22px}
.tap.accent .plus{background:var(--accent)}
.ghost{width:100%;margin-top:12px;background:transparent;border:1px solid var(--line);border-radius:12px;padding:12px;font:500 13px var(--sans);color:var(--muted);cursor:pointer}
.ghost:active{transform:scale(.99)}
.gaps{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.gap{padding:2px 2px}
.glab{font:400 12px var(--sans);color:var(--muted)}
.gval{font:700 26px/1 var(--sans);letter-spacing:-.5px;font-variant-numeric:tabular-nums;margin-top:6px;color:var(--ink)}
.gval.accent{color:var(--accent)}
.rule{height:1px;background:var(--line);margin:24px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:22px 12px}
.mv{font:700 30px/1 var(--sans);letter-spacing:-1px;font-variant-numeric:tabular-nums}
.mk{font:400 12px var(--sans);color:var(--muted);margin-top:5px}
.fine{font:400 11px/1.5 var(--sans);color:var(--muted);margin-top:16px}
.peakhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.eyebrow{font:600 10px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.peaktag{font:600 12px var(--mono);color:var(--accent)}
.chart{display:flex;align-items:flex-end;gap:2px;height:96px;margin-top:12px}
.bar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:4px}
.barfill{width:100%;border-radius:3px;background:#C9CBEF}
.barfill.pk{background:var(--accent)}
.barfill.empty{background:var(--line)}
.bh{font:400 8px var(--mono);color:var(--muted)}
.tools{display:flex;gap:12px}
.tool{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;font:500 13px var(--sans);color:var(--ink);cursor:pointer}
.tool:active{transform:scale(.98)}
.danger.armed{border-color:var(--accent);color:var(--accent)}
.warnbox{margin-top:16px;padding:12px 14px;border:1px solid var(--accent);border-radius:12px;background:var(--accent-soft);font:400 12.5px/1.5 var(--sans);color:var(--ink)}
.foot{font:400 11px/1.6 var(--sans);color:var(--muted);text-align:center;margin-top:22px}
#toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:100px;font:600 13px var(--sans);opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
/* ==== Tap Meter core logic (pure, testable) ==== */
var MAX_WAKING_H = 17; // 9am -> 2am window

function computeDayStart(events, nowTs) {
  var wakes = events.filter(function (e) { return e.t === 'wake'; })
    .map(function (e) { return e.ts; }).sort(function (a, b) { return a - b; });
  if (wakes.length) return wakes[wakes.length - 1];
  var cons = events.filter(function (e) { return e.t === 'terea' || e.t === 'zyn'; })
    .map(function (e) { return e.ts; });
  if (cons.length) return Math.min.apply(null, cons);
  return nowTs;
}

function countSince(events, dayStart, type) {
  return events.filter(function (e) { return e.t === type && e.ts >= dayStart; }).length;
}

function hoursAwake(dayStart, nowTs, cap) {
  var h = (nowTs - dayStart) / 3600000;
  if (h < 0) h = 0;
  if (h > cap) h = cap;
  return h;
}

function perHour(count, hAwake) {
  return count / Math.max(1, hAwake);
}

function wakeCount(events) {
  return events.filter(function (e) { return e.t === 'wake'; }).length;
}

function avgPerDay(events, type) {
  var total = events.filter(function (e) { return e.t === type; }).length;
  var days = Math.max(1, wakeCount(events));
  return total / days;
}

function lastOf(events, type) {
  var t = events.filter(function (e) { return e.t === type; }).map(function (e) { return e.ts; });
  return t.length ? Math.max.apply(null, t) : null;
}

function peakHours(events) {
  var b = new Array(24).fill(0);
  events.filter(function (e) { return e.t === 'terea' || e.t === 'zyn'; })
    .forEach(function (e) { b[new Date(e.ts).getHours()]++; });
  var order = [];
  for (var h = 9; h < 24; h++) order.push(h);
  for (var k = 0; k < 9; k++) order.push(k);
  var data = order.map(function (hr) { return { h: hr, n: b[hr] }; });
  var max = Math.max.apply(null, [1].concat(data.map(function (d) { return d.n; })));
  var peak = null, pn = 0;
  data.forEach(function (d) { if (d.n > pn) { pn = d.n; peak = d.h; } });
  return { data: data, max: max, peakHour: peak };
}

function fmtAgo(ms) {
  if (ms == null) return '\u2014';
  var m = Math.floor(ms / 60000);
  if (m < 1) return 'now';
  if (m < 60) return m + 'm';
  var h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}

function undoLast(events) {
  for (var i = events.length - 1; i >= 0; i--) {
    if (events[i].t === 'terea' || events[i].t === 'zyn') {
      return events.slice(0, i).concat(events.slice(i + 1));
    }
  }
  return events;
}

if (typeof module !== 'undefined' && module.exports) {
  module.exports = {
    MAX_WAKING_H: MAX_WAKING_H, computeDayStart: computeDayStart, countSince: countSince,
    hoursAwake: hoursAwake, perHour: perHour, wakeCount: wakeCount, avgPerDay: avgPerDay,
    lastOf: lastOf, peakHours: peakHours, fmtAgo: fmtAgo, undoLast: undoLast
  };
}

/* ==== Tap Meter UI (browser) — depends on functions from logic.js ==== */
(function () {
  var LS = 'tapmeter.v1';
  var events = [];
  var storageOK = true;
  var pendingWake = false, pendingReset = false;
  var wakeT = null, resetT = null, bump = null;

  function load() {
    try { var r = localStorage.getItem(LS); events = r ? JSON.parse(r) : []; if (!Array.isArray(events)) events = []; }
    catch (e) { storageOK = false; events = []; }
  }
  function save() {
    try { localStorage.setItem(LS, JSON.stringify(events)); }
    catch (e) { storageOK = false; }
  }
  function now() { return Date.now(); }
  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.style.opacity = '1';
    clearTimeout(toast._t); toast._t = setTimeout(function () { t.style.opacity = '0'; }, 1500);
  }

  function add(type) { events.push({ t: type, ts: now() }); bump = type; save(); render(); setTimeout(function () { bump = null; }, 220); }
  function undo() { var n = undoLast(events); if (n.length === events.length) { toast('Nothing to undo'); return; } events = n; save(); render(); toast('Removed last'); }
  function startDay() {
    if (!pendingWake) { pendingWake = true; render(); clearTimeout(wakeT); wakeT = setTimeout(function () { pendingWake = false; render(); }, 3000); return; }
    pendingWake = false; events.push({ t: 'wake', ts: now() }); save(); render(); toast('New day started');
  }
  function resetAll() {
    if (!pendingReset) { pendingReset = true; render(); clearTimeout(resetT); resetT = setTimeout(function () { pendingReset = false; render(); }, 3000); return; }
    pendingReset = false; events = []; save(); render(); toast('All data cleared');
  }
  function exportData() {
    try {
      var blob = new Blob([JSON.stringify(events, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'tapmeter-backup-' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      toast('Backup downloaded');
    } catch (e) { toast('Export failed'); }
  }
  function importData(file) {
    var r = new FileReader();
    r.onload = function () {
      try {
        var data = JSON.parse(r.result);
        if (!Array.isArray(data)) throw new Error('bad');
        events = data.filter(function (e) { return e && e.t && typeof e.ts === 'number'; });
        save(); render(); toast('Restored ' + events.length + ' events');
      } catch (e) { toast('Invalid backup file'); }
    };
    r.readAsText(file);
  }

  function esc(s) { return String(s); }

  function render() {
    var t = now();
    var dayStart = computeDayStart(events, t);
    var started = wakeCount(events) > 0;
    var sT = countSince(events, dayStart, 'terea');
    var zT = countSince(events, dayStart, 'zyn');
    var hA = hoursAwake(dayStart, t, MAX_WAKING_H);
    var sph = perHour(sT, hA).toFixed(1);
    var zph = perHour(zT, hA).toFixed(1);
    var avgS = avgPerDay(events, 'terea').toFixed(1);
    var avgZ = avgPerDay(events, 'zyn').toFixed(1);
    var lastT = lastOf(events, 'terea');
    var lastZ = lastOf(events, 'zyn');
    var pk = peakHours(events);
    var days = Math.max(1, wakeCount(events));

    var status = started
      ? 'Awake ' + fmtAgo(t - dayStart) + ' &middot; since ' + new Date(dayStart).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      : 'Tap New day when you wake';

    var bars = pk.data.map(function (d) {
      var isPk = d.h === pk.peakHour && d.n > 0;
      var h = Math.round((d.n / pk.max) * 100);
      var lab = (d.h % 3 === 0) ? '<span class="bh">' + d.h + '</span>' : '<span class="bh">&nbsp;</span>';
      return '<div class="bar"><div class="barfill' + (isPk ? ' pk' : (d.n === 0 ? ' empty' : '')) +
        '" style="height:' + Math.max(d.n > 0 ? 4 : 1, h) + '%"></div>' + lab + '</div>';
    }).join('');

    var peakLabel = pk.peakHour != null ? hourLabel(pk.peakHour) + ' heaviest' : 'no data yet';

    var html =
      '<div class="top">' +
        '<div><div class="brand">Tap Meter</div><div class="status">' + status + '</div></div>' +
        '<button id="wake" class="chip' + (pendingWake ? ' warn' : '') + '">' + (pendingWake ? 'Tap again \u21bb' : 'New day') + '</button>' +
      '</div>' +

      '<div class="taps">' +
        tapCard('terea', 'Terea', sT, false) +
        tapCard('zyn', 'Zyn', zT, true) +
      '</div>' +

      '<button id="undo" class="ghost">\u21a9 Undo last tap</button>' +

      '<div class="gaps">' +
        gapCard('Since last Terea', fmtAgo(lastT ? t - lastT : null), false) +
        gapCard('Since last Zyn', fmtAgo(lastZ ? t - lastZ : null), true) +
      '</div>' +

      '<div class="rule"></div>' +
      '<div class="grid">' +
        metric(sph, 'Terea / waking hr') +
        metric(zph, 'Zyn / waking hr') +
        metric(avgS, 'Terea / day avg') +
        metric(avgZ, 'Zyn / day avg') +
      '</div>' +
      '<div class="fine">Per-hour = today \u00f7 hours awake (' + hA.toFixed(1) + 'h, capped 17). Day avg over ' + days + ' logged day' + (days > 1 ? 's' : '') + '.</div>' +

      '<div class="rule"></div>' +
      '<div class="peakhead"><span class="eyebrow">Peak hours</span><span class="peaktag">' + peakLabel + '</span></div>' +
      '<div class="chart">' + bars + '</div>' +

      '<div class="rule"></div>' +
      '<div class="tools">' +
        '<button id="exp" class="tool">Export backup</button>' +
        '<button id="imp" class="tool">Import</button>' +
        '<input id="file" type="file" accept="application/json,.json" style="display:none">' +
      '</div>' +
      '<button id="reset" class="ghost danger' + (pendingReset ? ' armed' : '') + '">' + (pendingReset ? 'Tap again to erase everything' : 'Reset all data') + '</button>' +

      (storageOK ? '' : '<div class="warnbox">Your browser is blocking local storage (private mode?). Data won\u2019t save. Open this in normal Safari.</div>') +
      '<div class="foot">Reducing inhaled tobacco is real progress. Nicotine still loads your heart \u2014 this meter is the bridge, not the destination.</div>';

    document.getElementById('app').innerHTML = html;

    // wire up
    document.querySelector('#tap-terea').onclick = function () { add('terea'); };
    document.querySelector('#tap-zyn').onclick = function () { add('zyn'); };
    document.getElementById('undo').onclick = undo;
    document.getElementById('wake').onclick = startDay;
    document.getElementById('reset').onclick = resetAll;
    document.getElementById('exp').onclick = exportData;
    var fileEl = document.getElementById('file');
    document.getElementById('imp').onclick = function () { fileEl.click(); };
    fileEl.onchange = function (e) { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; };
  }

  function tapCard(type, label, count, accent) {
    var b = (bump === type) ? ' bumped' : '';
    return '<button id="tap-' + type + '" class="tap' + (accent ? ' accent' : '') + '">' +
      '<span class="num' + b + '">' + count + '</span>' +
      '<span class="tlab">' + label + ' today</span>' +
      '<span class="plus">+1</span></button>';
  }
  function gapCard(label, val, accent) {
    return '<div class="gap"><div class="glab">' + label + '</div><div class="gval' + (accent ? ' accent' : '') + '">' + val + '</div></div>';
  }
  function metric(v, k) {
    return '<div class="m"><div class="mv">' + v + '</div><div class="mk">' + k + '</div></div>';
  }
  function hourLabel(h) {
    var ap = h < 12 ? 'am' : 'pm';
    var hr = h % 12 === 0 ? 12 : h % 12;
    return hr + ap;
  }

  load();
  render();
  setInterval(render, 20000); // keep live times fresh
})();

</script>
</body>
</html>
